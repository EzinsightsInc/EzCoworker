<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Conversation — EZ Coworker</title>
    <link rel="icon" type="image/png" href="image.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <style>
        :root {
            --bg-base: #080e1a; --bg-panel: #0e1525; --bg-surface: #141e33;
            --border-subtle: rgba(255,255,255,0.06); --border-mid: rgba(255,255,255,0.1);
            --accent-blue: #3b82f6; --text-primary: #f0f4ff;
            --text-secondary: #8892ab; --text-muted: #4a5568;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-base); color: var(--text-primary); margin: 0; }
        h1,h2,h3 { font-family: 'Outfit', sans-serif; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

        .msg-prose p { margin-bottom: 0.65em; line-height: 1.65; }
        .msg-prose p:last-child { margin-bottom: 0; }
        .msg-prose ul { list-style: disc; margin: 0.35em 0 0.65em 1.25em; }
        .msg-prose ol { list-style: decimal; margin: 0.35em 0 0.65em 1.25em; }
        .msg-prose li { margin-bottom: 0.2em; line-height: 1.5; }
        .msg-prose h1,.msg-prose h2,.msg-prose h3 { font-weight:600;margin:0.9em 0 0.3em;color:#f3f4f6; }
        .msg-prose code:not(pre code) { background:#1e293b;padding:0.1em 0.38em;border-radius:0.2em;font-size:0.85em;color:#e2e8f0;font-family:ui-monospace,monospace; }
        .msg-prose pre { background:#0d1117;padding:1em;border-radius:0.5em;overflow-x:auto;margin:0.5em 0;font-size:0.85em;line-height:1.55; }
        .msg-prose blockquote { border-left:2px solid #374151;padding-left:0.8em;color:#9ca3af;margin:0.5em 0; }
        .msg-prose a { color:#60a5fa;text-decoration:underline; }
        .msg-prose strong { font-weight:600;color:#f3f4f6; }
        .think-block { background:#111827;border-left:3px solid #2dd4bf;padding:0.6rem 0.9rem;margin:0.5rem 0;font-family:ui-monospace,monospace;font-size:0.82em;color:#6b7280;white-space:pre-wrap;border-radius:0 0.375rem 0.375rem 0; }

        @keyframes fadeUp { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
        .fade-up { animation: fadeUp 0.3s ease-out both; }
        .fade-up-2 { animation: fadeUp 0.3s 0.1s ease-out both; }
    </style>
</head>
<body class="min-h-screen">

<div id="app" class="max-w-3xl mx-auto px-4 py-8">

    <!-- Loading state -->
    <div id="loading" class="flex flex-col items-center justify-center py-24 gap-4">
        <div style="width:32px;height:32px;border:2px solid #1e3a5f;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
        <span class="text-sm" style="color:var(--text-muted);">Loading shared conversation…</span>
    </div>

    <!-- Error state -->
    <div id="error-state" class="hidden flex flex-col items-center justify-center py-24 gap-3 text-center">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-2" style="background:#1a0a0a;border:1px solid #7f1d1d;">
            <svg class="w-6 h-6 text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
        </div>
        <h2 class="text-lg font-semibold text-red-400">Conversation Not Found</h2>
        <p class="text-sm max-w-xs leading-relaxed" style="color:var(--text-muted);">This share link may have been revoked or doesn't exist.</p>
        <a href="/" class="mt-2 px-4 py-2 rounded-lg text-sm font-medium transition" style="background:#1d4ed8;color:#dbeafe;">Go to EZ Coworker</a>
    </div>

    <!-- Conversation content -->
    <div id="conversation" class="hidden">

        <!-- Header -->
        <div class="fade-up mb-6">
            <div class="flex items-center gap-3 mb-1">
                <div class="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0" style="background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.2);">
                    <svg class="w-4 h-4 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
                    </svg>
                </div>
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-medium" style="color:var(--text-muted);">EZ Coworker</span>
                        <span class="text-xs px-1.5 py-0.5 rounded" style="background:#0c1f3f;color:#60a5fa;border:1px solid #1e3a8a;font-size:0.6rem;">Shared</span>
                    </div>
                    <h1 id="conv-title" class="text-base font-semibold mt-0.5" style="color:var(--text-primary);">Conversation</h1>
                </div>
            </div>
            <p id="conv-date" class="text-xs ml-11" style="color:var(--text-muted);"></p>
        </div>

        <div style="height:1px;background:var(--border-subtle);margin-bottom:1.5rem;"></div>

        <!-- Messages -->
        <div id="messages" class="space-y-4 fade-up-2"></div>

        <!-- Shared Files -->
        <div id="shared-files" class="hidden fade-up-2" style="margin-top:1.5rem;">
            <div style="height:1px;background:var(--border-subtle);margin-bottom:1rem;"></div>
            <div style="font-size:0.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:0.6rem;">Files</div>
            <div id="shared-files-list" style="display:flex;flex-direction:column;gap:3px;"></div>
        </div>

        <!-- Footer -->
        <div class="mt-10 pt-6 text-center fade-up-2" style="border-top:1px solid var(--border-subtle);">
            <p class="text-xs mb-3" style="color:var(--text-muted);">Want your own AI workspace?</p>
            <a href="/" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition" style="background:#1d4ed8;color:#dbeafe;">
                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
                </svg>
                Try EZ Coworker
            </a>
        </div>
    </div>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script>
    const API_URL = 'http://localhost:5000/api';

    const renderer = new marked.Renderer();
    renderer.code = function(code, language) {
        const lang = language ? escapeHtml(language) : '';
        const src = escapeHtml(typeof code === 'object' ? code.text : code);
        return `<pre class="language-${lang}"><code>${src}</code></pre>`;
    };
    marked.setOptions({ renderer });

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = String(text);
        return d.innerHTML;
    }

    function parseContent(text) {
        let s = String(text);
        s = s.replace(/<think>([\s\S]*?)<\/think>/g,
            '<div class="think-block"><span style="font-size:0.75em;letter-spacing:0.07em;text-transform:uppercase;color:#2dd4bf;font-weight:600;">Chain of Thought</span><br>$1</div>');
        return DOMPurify.sanitize(marked.parse(s));
    }

    function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    }

    function formatTime(iso) {
        const d = new Date(iso);
        return d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
    }

    async function loadShare() {
        // Extract token from URL: /share/TOKEN or ?token=TOKEN
        let token = null;
        const pathParts = window.location.pathname.split('/');
        const shareIdx = pathParts.indexOf('share');
        if (shareIdx !== -1 && pathParts[shareIdx + 1]) {
            token = pathParts[shareIdx + 1];
        } else {
            token = new URLSearchParams(window.location.search).get('token');
        }

        if (!token) {
            showError();
            return;
        }

        try {
            const res = await fetch(`${API_URL}/share/${token}`);
            if (!res.ok) { showError(); return; }
            const data = await res.json();
            renderConversation(data);
        } catch (_) {
            showError();
        }
    }

    function showError() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error-state').classList.remove('hidden');
    }

    function renderConversation({ title, created_at, messages, inputs = [], outputs = [] }) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('conversation').classList.remove('hidden');
        document.title = `${title} — EZ Coworker`;
        document.getElementById('conv-title').textContent = title;
        document.getElementById('conv-date').textContent = formatDate(created_at);

        const container = document.getElementById('messages');
        for (const msg of messages) {
            const isUser = msg.role === 'user';
            const wrap = document.createElement('div');
            wrap.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

            const inner = document.createElement('div');
            inner.className = `flex flex-col ${isUser ? 'items-end' : 'items-start'} max-w-[80%]`;

            const label = document.createElement('div');
            label.className = 'flex items-center gap-2 text-xs mb-1 px-1';
            label.style.color = 'var(--text-muted)';
            label.innerHTML = `<span>${isUser ? 'User' : 'Agent'}</span><span>•</span><span>${formatTime(msg.created_at)}</span>`;

            const bubble = document.createElement('div');
            if (isUser) {
                bubble.className = 'px-4 py-2.5 rounded-2xl rounded-tr-sm text-sm leading-relaxed';
                bubble.style.cssText = 'background:#1d4ed8;color:#f0f4ff;';
                bubble.textContent = msg.content;
            } else {
                bubble.className = 'px-4 py-3 rounded-2xl rounded-tl-sm text-sm leading-relaxed msg-prose';
                bubble.style.cssText = 'background:#141e33;border:1px solid rgba(255,255,255,0.06);color:#d1d5db;';
                bubble.innerHTML = parseContent(msg.content);
            }

            inner.appendChild(label);
            inner.appendChild(bubble);
            wrap.appendChild(inner);
            container.appendChild(wrap);
        }

        // Render shared files if any
        const allFiles = [...inputs, ...outputs];
        if (allFiles.length > 0) {
            document.getElementById('shared-files').classList.remove('hidden');
            const filesList = document.getElementById('shared-files-list');

            const fmtSize = sz => sz < 1024 ? sz + ' B' : sz < 1048576 ? (sz/1024).toFixed(1) + ' KB' : (sz/1048576).toFixed(1) + ' MB';
            const fmtTime = ts => { if (!ts) return ''; const d = new Date(ts); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}); };

            for (const group of [{label:'Uploaded', files: inputs}, {label:'Generated', files: outputs}]) {
                if (!group.files.length) continue;
                const heading = document.createElement('div');
                heading.style.cssText = 'font-size:0.6rem;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:.05em;padding:6px 0 2px;';
                heading.textContent = `${group.label} (${group.files.length})`;
                filesList.appendChild(heading);

                for (const f of group.files) {
                    const isOut = f.folder === 'output';
                    const row = document.createElement('div');
                    row.style.cssText = 'display:flex;align-items:center;gap:6px;padding:3px 0;';
                    row.innerHTML = `
                        <span style="font-size:0.58rem;font-weight:600;padding:1px 5px;border-radius:3px;flex-shrink:0;${isOut?'background:#052e16;color:#4ade80;border:1px solid #166534;':'background:#0c1f3f;color:#60a5fa;border:1px solid #1e3a8a;'}">${isOut?'↓ output':'↑ input'}</span>
                        <svg style="width:11px;height:11px;flex-shrink:0;color:#6b7280" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                        <span style="font-size:0.7rem;color:#d1d5db;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${f.filename}">${f.filename}</span>
                        <span style="font-size:0.6rem;color:#4b5563;flex-shrink:0;">${fmtSize(f.size)}</span>
                        <span style="font-size:0.58rem;color:#374151;flex-shrink:0;white-space:nowrap;">${fmtTime(f.attached_at)}</span>
                    `;
                    filesList.appendChild(row);
                }
            }
        }
    }

    loadShare();
</script>
</body>
</html>
