# nginx.conf — EzCoWorker Community frontend
# Replaces `serve` (single-threaded Node.js) with nginx which handles
# thousands of concurrent SSE connections via async I/O.

server {
    listen 3500;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Upload size limit ─────────────────────────────────────
    client_max_body_size 100m;

    # ── API proxy — MUST use ^~ so it beats regex locations ───
    # Without ^~, regex rules like ~* \.html$ intercept URLs such as
    # /api/files/download/output/report.html and nginx serves a 404
    # static file response instead of proxying to the backend.
    # ^~ tells nginx: if this prefix matches, stop and use it — do NOT
    # check any regex location blocks.
    location ^~ /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE-specific — MUST be off for streaming to work
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        add_header X-Accel-Buffering "no";
    }

    # ── Share route rewrite (/share/:token → share.html) ──────
    location ~ ^/share/(.+)$ {
        try_files /share.html =404;
    }

    # ── No caching for HTML (always fresh) ────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # ── Static assets — cache aggressively ────────────────────
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ── Default fallback ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check ──────────────────────────────────────────
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
