# nginx.conf — EzCoWorker frontend
# Replaces `serve` (single-threaded Node.js) with nginx which handles
# thousands of concurrent SSE connections via async I/O.
#
# Why this matters:
#   `serve` runs in a single Node.js process. Each open SSE connection
#   (/api/chat/stream) holds a socket. Under load (10+ users streaming
#   simultaneously) the event loop stalls and new requests queue behind
#   the active streams, making the UI appear frozen. nginx uses epoll/kqueue
#   — each connection is just a file descriptor, no blocking.

server {
    listen 3500;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── No caching for HTML (always fresh) ────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # ── Static assets — cache aggressively ────────────────────
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ── Share route rewrite (/share/:token → share.html) ──────
    location ~ ^/share/(.+)$ {
        try_files /share.html =404;
    }

    # ── Upload size limit ─────────────────────────────────────
    client_max_body_size 100m;

    # ── Proxy all API calls + SSE to backend ──────────────────
    # SSE-critical settings:
    #   proxy_buffering off     — send chunks immediately, don't buffer
    #   proxy_read_timeout 3600 — keep SSE alive up to 1 hour
    #   X-Accel-Buffering no    — disable nginx-level response buffering
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE-specific — MUST be off for streaming to work
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        add_header X-Accel-Buffering "no";
    }

    # ── Default fallback ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check ──────────────────────────────────────────
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
